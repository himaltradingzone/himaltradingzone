<script>
        // =====================================================================
        // TRADE JOURNAL LOGIC (per logged-in user; stored locally per device)
        // =====================================================================
        const DEFAULT_PAYOUT = 85;
        const BASE_RISK_PERCENTAGE = 0.02;

        const state = {
            settings: {
                initialCapital: 1000,
                dailyTarget: 50,
                monthlyTarget: 200,
                dailyStopLoss: 50,
            },
            trades: [],
            currentBalance: 0,
            dailyStats: {
                pnl: 0, wins: 0, losses: 0,
                isLimitReached: false, isTargetReached: false,
                tradesToday: 0, recommendedTradeAmount: 0,
            },
            monthlyStats: { pnl: 0, wins: 0, losses: 0, monthlyGoalAchieved: false },
            currentPage: 'daily'
        };
        window.state = state;

        let appInitialized = false;

        function storageKey(name) {
            const uid = (currentUser && currentUser.uid) ? currentUser.uid : 'guest';
            return `himal_${name}_${uid}`;
        }

        function parseTradeDate(isoString) { return new Date(isoString); }

        function formatDate(date) {
            return date.toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric' });
        }
        function formatCurrency(amount) {
            return `$ ${parseFloat(Math.max(0, amount)).toFixed(2).toLocaleString('en-US')}`;
        }
        function formatPnl(amount) {
            return `${amount < 0 ? '-' : ''}$ ${parseFloat(Math.abs(amount)).toFixed(2).toLocaleString('en-US')}`;
        }
        function isToday(date) {
            const now = new Date();
            return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth() && date.getDate() === now.getDate();
        }
        function isThisMonth(date) {
            const now = new Date();
            return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth();
        }

        window.changePage = function(pageName) {
            state.currentPage = pageName;
            const dailyPage = document.getElementById('daily-page');
            const monthlyPage = document.getElementById('monthly-page');
            const dailyTab = document.getElementById('daily-tab');
            const monthlyTab = document.getElementById('monthly-tab');
            if (!dailyPage || !monthlyPage) return;

            if (pageName === 'daily') {
                dailyPage.classList.remove('hidden');
                monthlyPage.classList.add('hidden');
                dailyTab.classList.add('tab-active');
                monthlyTab.classList.remove('tab-active');
            } else {
                dailyPage.classList.add('hidden');
                monthlyPage.classList.remove('hidden');
                dailyTab.classList.remove('tab-active');
                monthlyTab.classList.add('tab-active');
            }
        }

        function isTradingDayActive() {
            return !state.dailyStats.isLimitReached && !state.dailyStats.isTargetReached;
        }

        function loadDataFromLocal() {
            try {
                const storedSettings = localStorage.getItem(storageKey('settings'));
                const storedTrades = localStorage.getItem(storageKey('trades'));
                if (storedSettings) {
                    const parsedSettings = JSON.parse(storedSettings);
                    state.settings = { ...state.settings, ...parsedSettings };
                }
                if (storedTrades) {
                    state.trades = JSON.parse(storedTrades);
                }
            } catch (e) {
                console.error("Error loading from local storage:", e);
            }
        }
        function saveDataToLocal() {
            try {
                localStorage.setItem(storageKey('settings'), JSON.stringify(state.settings));
                localStorage.setItem(storageKey('trades'), JSON.stringify(state.trades));
            } catch (e) {
                console.error("Error saving to local storage:", e);
                displayMessage('ডেটা সেভ করা যায়নি! ব্রাউজারে Local Storage ব্লক করা থাকতে পারে।', 'bg-red-100 text-red-700');
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('current-capital').value = state.settings.initialCapital;
            document.getElementById('daily-target').value = state.settings.dailyTarget;
            document.getElementById('monthly-target').value = state.settings.monthlyTarget;
            document.getElementById('daily-stop-loss').value = state.settings.dailyStopLoss;

            calculateStats();

            document.getElementById('current-balance-display').textContent = formatPnl(state.currentBalance);

            const pnlColor = state.dailyStats.pnl >= 0 ? 'text-primary' : 'text-red-500';
            document.getElementById('daily-pnl').innerHTML = `<span class="${pnlColor}">${formatPnl(state.dailyStats.pnl)}</span>`;
            document.getElementById('daily-wins').textContent = state.dailyStats.wins;
            document.getElementById('daily-losses').textContent = state.dailyStats.losses;
            document.getElementById('daily-stop-loss-value').textContent = formatCurrency(state.settings.dailyStopLoss || 0);
            document.getElementById('daily-target-value').textContent = formatCurrency(state.settings.dailyTarget || 0);

            const tradeInstruction = document.getElementById('trade-instruction');
            const tradesToday = state.dailyStats.tradesToday;
            const logTradeBtn = document.getElementById('log-trade-btn');
            const isTradingAllowed = isTradingDayActive();
            const recommendedAmount = state.dailyStats.recommendedTradeAmount;

            if (state.dailyStats.isLimitReached) {
                tradeInstruction.innerHTML = `
                    <div class="p-3 bg-red-100 text-red-700 font-semibold rounded-lg shadow-inner mb-4">
                        <p>⚠️ দৈনিক স্টপ লস (DSL) অতিক্রম করেছে! পরের দিন পর্যন্ত ট্রেডিং লক থাকবে।</p>
                    </div>`;
            } else if (state.dailyStats.isTargetReached) {
                tradeInstruction.innerHTML = `
                    <div class="p-3 bg-primary text-white font-semibold rounded-lg shadow-inner mb-4">
                        <p>🎯 অভিনন্দন! দৈনিক টার্গেট (DT) পূরণ হয়েছে। পরের দিন পর্যন্ত ট্রেডিং লক থাকবে।</p>
                    </div>`;
            } else {
                const dailyStopLossDisplay = formatCurrency(state.settings.dailyStopLoss || 0);
                const recommendedDisplay = formatPnl(recommendedAmount);
                tradeInstruction.innerHTML = `
                    <div class="p-4 bg-blue-100 text-blue-800 rounded-lg shadow-inner border border-blue-300 mb-4">
                        <p class="font-bold text-lg mb-1">✅ ট্রেডের জন্য প্রস্তুত!</p>
                        <p class="text-base font-semibold">প্রস্তাবিত ট্রেড অ্যামাউন্ট: <span class="text-primary font-extrabold">${recommendedDisplay}</span></p>
                        <p class="text-sm mt-2">এটি আপনার পরবর্তী ট্রেডের জন্য ডলারের পরিমাণের হিসেব। বর্তমান DSL: ${dailyStopLossDisplay}।</p>
                    </div>`;
                if (recommendedAmount > 0) {
                    document.getElementById('trade-amount').value = parseFloat(recommendedAmount).toFixed(2);
                } else {
                    document.getElementById('trade-amount').value = '';
                }
            }

            document.getElementById('daily-trade-count').textContent = tradesToday;
            logTradeBtn.disabled = !isTradingAllowed;

            const monthlyPnlColor = state.monthlyStats.pnl >= 0 ? 'text-primary' : 'text-red-500';
            document.getElementById('monthly-pnl').innerHTML = `<span class="${monthlyPnlColor}">${formatPnl(state.monthlyStats.pnl)}</span>`;
            document.getElementById('monthly-wins').textContent = state.monthlyStats.wins;
            document.getElementById('monthly-losses').textContent = state.monthlyStats.losses;

            const target = parseFloat(state.settings.monthlyTarget || 1);
            const progressPercent = Math.min(100, Math.max(0, (state.monthlyStats.pnl / target) * 100));
            document.getElementById('monthly-progress').style.width = `${progressPercent}%`;

            const progressEl = document.getElementById('monthly-progress');
            if (state.monthlyStats.pnl >= state.settings.monthlyTarget && state.settings.monthlyTarget > 0) {
                progressEl.classList.add('bg-primary');
                progressEl.classList.remove('bg-yellow-500');
            } else {
                progressEl.classList.add('bg-yellow-500');
                progressEl.classList.remove('bg-primary');
            }

            document.getElementById('monthly-target-value-display').textContent = formatCurrency(state.settings.monthlyTarget || 0);

            const tradeHistoryEl = document.getElementById('trade-history');
            tradeHistoryEl.innerHTML = '';
            const tradesWithDates = state.trades.map(t => ({ ...t, date: parseTradeDate(t.timestamp) }));
            const sortedTrades = [...tradesWithDates].sort((a, b) => b.date.getTime() - a.date.getTime());

            if (sortedTrades.length === 0) {
                tradeHistoryEl.innerHTML = `<p class="text-center text-gray-500 py-4">No trades recorded yet. (এখনও কোনো ট্রেড সেভ করা হয়নি।)</p>`;
            } else {
                sortedTrades.slice(0, 10).forEach(trade => {
                    const isWin = trade.result === 'Win';
                    const tradeColor = isWin ? 'text-primary' : 'text-red-500';
                    const tradeBg = isWin ? 'bg-green-50' : 'bg-red-50';
                    const pnl = isWin ? (trade.amount * (trade.payout / 100)) : -trade.amount;
                    const tradeElement = document.createElement('div');
                    tradeElement.className = `p-3 mb-2 rounded-lg ${tradeBg} border border-gray-200 flex justify-between items-center`;
                    tradeElement.innerHTML = `
                        <div>
                            <p class="font-semibold ${tradeColor}">${isWin ? '✅ Win' : '❌ Loss'}</p>
                            <p class="text-xs text-gray-500">${formatDate(trade.date)}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm">Amount: ${formatPnl(trade.amount)}</p>
                            <p class="font-bold ${tradeColor}">${pnl >= 0 ? '+' : ''}${formatPnl(pnl)}</p>
                        </div>`;
                    tradeHistoryEl.appendChild(tradeElement);
                });
            }

            window.changePage(state.currentPage);
        }

        function calculateStats() {
            let currentBalance = parseFloat(state.settings.initialCapital || 0);
            let dailyPnl = 0, dailyWins = 0, dailyLosses = 0, tradesToday = 0;
            let monthlyPnl = 0, monthlyWins = 0, monthlyLosses = 0;

            const tradesWithDates = state.trades.map(t => ({ ...t, date: parseTradeDate(t.timestamp) }));
            const sortedTrades = [...tradesWithDates].sort((a, b) => a.date.getTime() - b.date.getTime());

            sortedTrades.forEach(trade => {
                const pnl = trade.result === 'Win' ? (trade.amount * (trade.payout / 100)) : -trade.amount;
                currentBalance += pnl;
                if (isThisMonth(trade.date)) {
                    monthlyPnl += pnl;
                    if (trade.result === 'Win') monthlyWins++; else monthlyLosses++;
                    if (isToday(trade.date)) {
                        dailyPnl += pnl;
                        if (trade.result === 'Win') dailyWins++; else dailyLosses++;
                        tradesToday++;
                    }
                }
            });

            state.currentBalance = currentBalance;
            state.dailyStats.pnl = dailyPnl;
            state.dailyStats.wins = dailyWins;
            state.dailyStats.losses = dailyLosses;
            state.dailyStats.tradesToday = tradesToday;
            state.monthlyStats.pnl = monthlyPnl;
            state.monthlyStats.wins = monthlyWins;
            state.monthlyStats.losses = monthlyLosses;

            const stopLoss = parseFloat(state.settings.dailyStopLoss || 0);
            state.dailyStats.isLimitReached = (dailyPnl < 0) && (Math.abs(dailyPnl) >= stopLoss) && (stopLoss > 0);

            const dailyTarget = parseFloat(state.settings.dailyTarget || 0);
            state.dailyStats.isTargetReached = (dailyPnl >= dailyTarget) && (dailyTarget > 0);

            const monthlyTarget = parseFloat(state.settings.monthlyTarget || 0);
            state.monthlyStats.monthlyGoalAchieved = (monthlyPnl >= monthlyTarget) && (monthlyTarget > 0);

            let recommendedTradeAmount = 0;
            if (stopLoss > 0) {
                if (dailyPnl < 0) {
                    const accumulatedLoss = Math.abs(dailyPnl);
                    const payoutRate = DEFAULT_PAYOUT / 100;
                    const requiredRecoveryAmount = accumulatedLoss / payoutRate;
                    const remainingDailyStopLossBuffer = Math.max(0, stopLoss - accumulatedLoss);
                    recommendedTradeAmount = Math.min(requiredRecoveryAmount, remainingDailyStopLossBuffer);
                } else {
                    const initialCapital = parseFloat(state.settings.initialCapital || 0);
                    let baseRiskAmount = initialCapital * BASE_RISK_PERCENTAGE;
                    recommendedTradeAmount = Math.min(baseRiskAmount, stopLoss);
                }
            }

            if (isTradingDayActive()) {
                recommendedTradeAmount = Math.ceil(recommendedTradeAmount);
                recommendedTradeAmount = Math.max(1, recommendedTradeAmount);
                recommendedTradeAmount = Math.min(recommendedTradeAmount, state.currentBalance);
                state.dailyStats.recommendedTradeAmount = recommendedTradeAmount;
            } else {
                state.dailyStats.recommendedTradeAmount = 0;
            }
        }

        function saveSettings() {
            const initialCapital = parseFloat(document.getElementById('current-capital').value) || 0;
            const dailyTarget = parseFloat(document.getElementById('daily-target').value) || 0;
            const monthlyTarget = parseFloat(document.getElementById('monthly-target').value) || 0;
            const dailyStopLoss = parseFloat(document.getElementById('daily-stop-loss').value) || 0;

            state.settings = { initialCapital, dailyTarget, monthlyTarget, dailyStopLoss };
            saveDataToLocal();
            displayMessage('Settings saved successfully! (সেটিংস সেভ হয়েছে!)', 'bg-green-100 text-green-700');
        }

        function logTrade() {
            const result = document.querySelector('input[name="trade-result"]:checked')?.value;
            const amount = parseFloat(document.getElementById('trade-amount').value);
            const payout = parseFloat(document.getElementById('payout-percent').value);

            if (!result || isNaN(amount) || amount <= 0 || isNaN(payout) || payout < 0) {
                return displayMessage('Please enter valid trade data (Result, Amount, Payout). (সঠিক ট্রেড ডেটা দিন!)', 'bg-yellow-100 text-yellow-700');
            }
            if (!isTradingDayActive()) {
                return displayMessage('Sorry, the daily target/stop loss limit has been reached. No new trades should be recorded until the next day. (সীমা পূরণ হয়েছে, নতুন ট্রেড করা যাবে না!)', 'bg-red-100 text-red-700');
            }
            if (amount > state.currentBalance) {
                return displayMessage('ট্রেড অ্যামাউন্ট বর্তমান মূলধনের চেয়ে বেশি হতে পারে না!', 'bg-red-100 text-red-700');
            }

            const tradeData = { result, amount, payout, timestamp: new Date().toISOString() };
            state.trades.push(tradeData);
            saveDataToLocal();

            const checkedRadio = document.querySelector('input[name="trade-result"]:checked');
            if (checkedRadio) checkedRadio.checked = false;

            displayMessage('Trade successfully recorded! (ট্রেড সেভ হয়েছে!)', 'bg-green-100 text-green-700');
        }

        function resetTradingData() {
            const confirmationText = document.getElementById('reset-confirmation-input').value;
            if (confirmationText !== 'RESET') {
                return displayMessage('ডেটা মুছে ফেলতে কনফার্মেশন বক্সে (uppercase) "RESET" টাইপ করুন।', 'bg-red-100 text-red-700');
            }
            state.settings.initialCapital = parseFloat(document.getElementById('current-capital').value) || 0;
            state.trades = [];
            saveDataToLocal();

            document.getElementById('reset-confirmation-input').value = '';
            document.getElementById('reset-data-btn').textContent = 'Reset All Trade Data (সমস্ত ডেটা রিসেট করুন)';
            document.getElementById('reset-data-btn').disabled = false;

            displayMessage('✅ সমস্ত ট্রেড হিস্টরি সফলভাবে মুছে ফেলা হয়েছে! আপনি এখন নতুন লক্ষ্য এবং মূলধন সেট করতে পারেন।', 'bg-primary text-white');
        }

        function displayMessage(message, classes = 'bg-blue-100 text-blue-700') {
            const messageBox = document.getElementById('message-box');
            messageBox.innerHTML = `<p>${message}</p>`;
            messageBox.className = `p-3 mb-4 rounded-lg text-sm font-medium ${classes}`;
            messageBox.classList.remove('hidden');
            setTimeout(() => { messageBox.classList.add('hidden'); }, 5000);
        }

        // Called every time the user lands on the app screen; only wires up
        // event listeners and loads data the first time to avoid duplicate bindings.
        function initializeAppOnce() {
            if (appInitialized) {
                // Refresh capital display in case of same-session re-entry
                updateUI();
                return;
            }
            appInitialized = true;

            loadDataFromLocal();
            updateUI();

            document.getElementById('save-settings-btn').addEventListener('click', saveSettings);
            document.getElementById('log-trade-btn').addEventListener('click', logTrade);
            document.getElementById('reset-data-btn').addEventListener('click', resetTradingData);

            const balanceInput = document.getElementById('current-capital');
            balanceInput.addEventListener('input', () => {
                document.getElementById('current-balance-display').textContent = window.formatCurrency(parseFloat(balanceInput.value) || 0);
                window.calculateStats();
            });

            const settingInputs = ['daily-target', 'monthly-target', 'daily-stop-loss'];
            settingInputs.forEach(id => {
                const element = document.getElementById(id);
                if (element) element.addEventListener('input', window.calculateStats);
            });

            window.changePage('daily');
        }

        window.formatCurrency = formatCurrency;
        window.calculateStats = calculateStats;
        window.initializeAppOnce = initializeAppOnce;

        document.addEventListener('DOMContentLoaded', () => {
            const yearEl = document.getElementById('footer-year');
            if (yearEl) yearEl.textContent = new Date().getFullYear();
        });
    </script>
